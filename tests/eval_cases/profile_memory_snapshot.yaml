        credit_profile:
          summary: Credit profile degraded
          structured_result:
            status: data_missing
            evidence_status: partial
          charts: []
          report_markdown: Credit profile degraded
        comprehensive_profile:
          summary: Comprehensive profile degraded
          structured_result:
            status: ok
            evidence_status: partial
            summary: Degraded profile due to upstream signal.
            segment: S2
            overall_risk: medium
            overall_value: high
            confidence: medium
          charts: []
          report_markdown: Comprehensive profile degraded
    expected:
      decision: allowed
      degraded_nodes: [credit, comprehensive]
      required_structured_fields: [evidence_status]
    tags: [profile_snapshot, degraded]
    severity: blocker
    source: m5_profile_dag_regression
