- case_id: semantic_general_chat_returns_visible_preference
  suite: memory_semantic_retrieval
  task_type: memory_semantic_retrieval
  source: m6b_semantic_runtime
  severity: major
  input:
    check_kind: semantic_retrieval
    query: User prefers concise Chinese output.
    task_type: general_chat
    user_id: u1
    project_id: p1
    country: mx
    allow_fts: false
    max_vector_items: 3
    records:
      - memory_id: pref-1
        content: User prefers concise Chinese output.
        memory_source_type: user_preference
        authority_level: user_provided
        allowed_memory_use: [response_style]
        forbidden_memory_use: [permission_override]
        user_id: u1
        project_id: p1
        country: mx
        category: preference
  expected:
    returned_memory_ids: [pref-1]
    rejected_memory_ids: []
    warning_codes: []

