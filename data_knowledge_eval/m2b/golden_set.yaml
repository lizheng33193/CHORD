      - hive.dwd.dwd_w_apply
    expected_fields:
      - user_uuid
      - apply_time
    expected_glossary_terms:
      - no_apply
      - recent_30d
    expected_sql_examples: []
    forbidden_examples:
      - missing_anti_join
    notes:
      - This cohort should use anti-join or equivalent absence logic.

