cases:
  - case_id: mx-high-risk-cohort
    country: mx
    domain: risk
    run_type: cohort_query
    output_bucket: null
    request: 找最近 7 天高风险用户
    expected_tables:
      - hive.dwd.dwd_w_apply
    expected_fields:
      - user_uuid
      - risk_level
      - apply_time
      - dt
    expected_glossary_terms:
      - high_risk
      - recent_7d
    expected_sql_examples: []
    forbidden_examples:
      - fixed_historical_date_copy
      - historical_source_filter_copy
    notes:
      - dt can be used for partition pruning but should not replace the business time field.

  - case_id: mx-recent-7d-risk-users
    country: mx
    domain: risk
    run_type: cohort_query
    output_bucket: null
    request: 提取墨西哥最近 7 天风险等级较高的用户
    expected_tables:
      - hive.dwd.dwd_w_apply
    expected_fields:
      - user_uuid
      - risk_level
      - apply_time
    expected_glossary_terms:
      - high_risk
      - recent_7d
    expected_sql_examples: []
    forbidden_examples:
      - fixed_historical_date_copy
    notes:
      - Recent window should stay relative to request time.

  - case_id: mx-first-loan-never-overdue
    country: mx
    domain: lifecycle
    run_type: cohort_query
    output_bucket: null
    request: 找出墨西哥首贷且从未逾期的用户
    expected_tables:
      - hive.dwd.dwd_w_apply
    expected_fields:
      - user_uuid
      - withdraw_uuid
      - apply_time
      - overdue_days
    expected_glossary_terms:
      - first_loan
      - never_overdue
    expected_sql_examples: []
    forbidden_examples:
      - withdraw_uuid_negative_mismatch
    notes:
      - First-loan semantics should prefer loan-order logic rather than naive customer type only.

  - case_id: mx-mob1-settled-7d-churn
    country: mx
    domain: lifecycle
    run_type: cohort_query
    output_bucket: null
    request: 提取墨西哥 mob1 首贷结清 7 天未复借流失用户
    expected_tables:
      - hive.dwd.dwd_w_apply
    expected_fields:
      - user_uuid
      - withdraw_uuid
      - apply_create_at
      - asset_finish_at
      - asset_grant_at
    expected_glossary_terms:
      - mob1
      - first_loan
      - fully_settled
      - seven_day_no_reborrow_churn
    expected_sql_examples:
      - mob1_churn_pattern
    forbidden_examples:
      - missing_settlement_7d_observation
      - missing_reborrow_anti_join
      - fixed_historical_date_copy
    notes:
      - mob1 must include first loan, full settlement, settlement over 7 days, and no reborrow within 7 days.

  - case_id: mx-behavior-writeback
    country: mx
    domain: behavior
    run_type: bucket_writeback
    output_bucket: behavior
    request: 用 Data Agent 补齐这些用户的 behavior 数据并写回 behavior
    expected_tables:
      - hive.dwb.dwb_b1_data_burying_point
    expected_fields:
      - uid
      - timestamp_
      - eventname
    expected_glossary_terms:
      - writeback_behavior
      - uid_cohort_required
    expected_sql_examples:
      - behavior_writeback_pattern
    forbidden_examples:
      - broad_behavior_scan
      - unresolved_uid_placeholder
    notes:
      - Behavior writeback requires a cohort or uid constraint and must not broad-scan the event table.

  - case_id: mx-glossary-combo-writeback
    country: mx
    domain: behavior
    run_type: bucket_writeback
    output_bucket: behavior
    request: 先找最近 7 天高风险用户，再补齐这些用户的 behavior 数据并写回 behavior
    expected_tables:
      - hive.dwd.dwd_w_apply
      - hive.dwb.dwb_b1_data_burying_point
    expected_fields:
      - user_uuid
      - risk_level
      - apply_time
      - uid
      - timestamp_
      - eventname
    expected_glossary_terms:
      - high_risk
      - recent_7d
      - writeback_behavior
    expected_sql_examples:
      - behavior_writeback_pattern
    forbidden_examples:
      - historical_template_drift
      - broad_behavior_scan
    notes:
      - Retrieval should preserve both cohort semantics and writeback constraints.

  - case_id: mx-no-apply-cohort
    country: mx
    domain: lifecycle
    run_type: cohort_query
    output_bucket: null
    request: 找出最近 30 天没有申请记录的墨西哥用户
    expected_tables:
