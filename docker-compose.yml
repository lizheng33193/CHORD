services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MODEL_MODE: ${MODEL_MODE:-mock}
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
      DATA_ACQUISITION_ENABLED: ${DATA_ACQUISITION_ENABLED:-false}
      MEMORY_DB_PATH: ${MEMORY_DB_PATH:-/app/outputs/memory/memory.sqlite3}
      RISK_KNOWLEDGE_REDIS_URL: redis://redis:6379/15
      MEMORY_VECTOR_CONTEXT_INJECTION_ENABLED: ${MEMORY_VECTOR_CONTEXT_INJECTION_ENABLED:-0}
      HYBRID_RETRIEVAL_ENABLED: ${HYBRID_RETRIEVAL_ENABLED:-0}
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./storage:/app/storage
      - ./data:/app/data:ro
    depends_on:
      - redis
    command: >
      sh -c "python scripts/bootstrap_runtime_dirs.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data:
