- source_key: example:first-loan-never-overdue
  natural_language_request: 查询墨西哥首贷从未逾期用户
  run_type: cohort_query
  output_bucket:
  sql_hash: mx-example-first-loan-never-overdue
  sql_text: "SELECT uid FROM dwd_w_apply WHERE loan_count = 1 AND max_overdue_days = 0 LIMIT 100"
  tables_used: ["dwd_w_apply"]
  fields_used: ["uid", "loan_count", "max_overdue_days"]
  pattern_summary: 首贷从未逾期 cohort 示例
  reviewer_username: seed
  execution_status: executed
- source_key: example:behavior-writeback
  natural_language_request: 用 Data Agent 补齐这些用户的 behavior 数据并写回 behavior
  run_type: bucket_writeback
  output_bucket: behavior
  sql_hash: mx-example-behavior-writeback
  sql_text: "WITH target_users AS (SELECT DISTINCT uid FROM dwd_w_apply WHERE apply_time >= date_sub(current_date, 7) AND risk_level = 'high'), behavior_events AS (SELECT b.uid, b.timestamp_, b.eventname FROM dwb_b1_data_burying_point b JOIN target_users u ON b.uid = u.uid WHERE b.source IN ('MEXI','MEXICASH')) SELECT uid, timestamp_, eventname FROM behavior_events"
  tables_used: ["dwd_w_apply", "dwb_b1_data_burying_point"]
  fields_used: ["uid", "apply_time", "risk_level", "timestamp_", "eventname"]
  pattern_summary: Behavior writeback SQL must always restrict rows by a target cohort or explicit uid list before reading behavior events. The behavior source table should be joined by uid, and the output for output_bucket=behavior should include uid plus behavior event fields such as timestamp_ and eventname. Do not scan the behavior table without a cohort/uid constraint and do not rely on LIMIT as the primary safety boundary.
  reviewer_username: seed
  execution_status: executed
