- source_key: term:first_loan
  term: 首贷
  synonyms: ["first loan", "首次放款"]
  definition: 首次成功放款用户
  mapped_tables: ["dwd_w_apply"]
  mapped_fields: ["loan_count"]
  suggested_filters: ["loan_count = 1"]
- source_key: term:never_overdue
  term: 从未逾期
  synonyms: ["never overdue"]
  definition: 历史最大逾期天数为 0
  mapped_tables: ["dwd_w_apply"]
  mapped_fields: ["max_overdue_days"]
  suggested_filters: ["max_overdue_days = 0"]
- source_key: term:writeback_behavior
  term: 写回 behavior
  synonyms: ["补齐 behavior", "writeback behavior"]
  definition: 用于 behavior bucket 写回的按 uid 返回的行为查询结果
  mapped_tables: []
  mapped_fields: ["uid", "timestamp_", "eventname"]
  suggested_filters: ["output_bucket = behavior", "query_only only"]
- source_key: term:high_risk_user
  term: 高风险用户
  synonyms: ["high risk", "高风险"]
  definition: 风险分层为高风险的用户
  mapped_tables: ["dwd_w_apply"]
  mapped_fields: ["risk_level"]
  suggested_filters: ["risk_level = 'high'"]
- source_key: term:last_7_days
  term: 最近7天
  synonyms: ["最近 7 天", "近7天", "last 7 days"]
  definition: 以申请时间为准的最近 7 天时间窗口
  mapped_tables: ["dwd_w_apply"]
  mapped_fields: ["apply_time"]
  suggested_filters: ["apply_time >= date_sub(current_date, 7)"]
